<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Sonakshi🎉</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #ff9ff3, #54a0ff, #5f27cd, #00d2d3, #ff9a9e);
            background-size: 600% 600%;
            animation: gradientShift 8s ease infinite;
            text-align: center;
            color: #333;
            min-height: 100vh;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            margin-top: 60px;
        }

        h1 {
            font-size: 3em;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            animation: textGlow 2s ease-in-out infinite alternate;
        }

        @keyframes textGlow {
            from { filter: drop-shadow(0 0 5px rgba(255,107,107,0.5)); }
            to { filter: drop-shadow(0 0 20px rgba(254,202,87,0.8)); }
        }

        p {
            font-size: 1.2em;
            margin: 20px;
            background: rgba(255,255,255,0.9);
            padding: 15px 25px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .birthday-img {
            width: 250px;
            border-radius: 15px;
            margin-top: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 4px solid rgba(255,255,255,0.4);
        }

        button {
            padding: 12px 25px;
            font-size: 1em;
            border: none;
            border-radius: 25px;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255,107,107,0.4);
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255,107,107,0.6);
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }

        button:hover::before {
            left: 100%;
        }

        .hidden {
            display: none;
        }

        #surprise {
            margin-top: 30px;
            background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,255,255,0.9));
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.3);
            animation: surprisePop 0.6s ease-out;
        }

        @keyframes surprisePop {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        iframe {
            margin-top: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            border: 3px solid rgba(255,255,255,0.3);
        }

        h3 {
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            font-size: 1.5em;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🎉 Happy Birthday Sonakshi! 🎉</h1>

    <!-- Your Image -->
    <img src="photo.png" width="300" height="450">
    <p>
        Happy Birthday Dear Sona🥰.
        I know ki jyada acha nhi tha lekin i tried my best 
        acha birthday surprise dene ke liye.
         I hope you like it.
          I wish ki tum jaldi thik hojao and hamesa khush raho.
    </p>

    <!-- Music (YouTube Embed) -->
    <h3>🎵 Birthday Edit</h3>
    <iframe src="Happy Birthday Dear Sona 🥰🩷.mp4"
width="300" height="170" allow="autoplay">
</iframe>

    <br><br>

    <button onclick="showSurprise()">Click for Surprise 🎁</button>

    <div id="surprise" class="hidden">
        <h2>🎂 You are amazing! 🎂</h2>
        <p>You are the best person in my life🥰</p>
    </div>
</div>

<script>
    function showSurprise() {
        document.getElementById("surprise").style.display = "block";
    }
</script>

</body>
</html>
